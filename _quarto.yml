project:
  type: book
  output-dir: _book

book:
  title: "Conociendo el riesgo por aguas de escorrentía"
  date: "2025-12-03"
  
  repo-url: https://github.com/scr-ungrd/conociendo-el-riesgo-aguas-escorrentia
  repo-actions: [source, issue]
  downloads: [pdf]
  site-url: https://scr-ungrd.github.io/conociendo-el-riesgo-aguas-escorrentia
  sidebar:
    style: floating
    collapse-level: 1
  chapters:
    - index.qmd
    - text: "1. Presentación"
      href: 01-presentacion.qmd
    - text: "2. Aguas de escorrentía"
      href: 02-aguas-de-escorrentia.qmd
    - text: "3. Riesgos asociados y consecuencias"
      href: 03-riesgos-asociados-y-consecuencias.qmd
    - text: "4. Factores que agravan el problema"
      href: 04-factores-que-agravan-el-problema.qmd
    - text: "5. Medidas de mitigación y buenas prácticas"
      href: 05-medidas-de-mitigacion-y-buenas-practicas.qmd
    - 06-referencias-bibliograficas.qmd

lang: es

bibliography: references.bib
csl: apa.csl
link-citations: true
nocite: |
  @*

crossref:
  fig-prefix: "Figura"
  tbl-prefix: "Tabla"
  chapters: true

format:
  html:
    theme: cosmo
    toc: true
    number-sections: false
    reference-location: block
    logo: "media/CUB_AGUAS ESCORRENTIA-1.png"
    css:
      - custom.css
    include-in-header:
      - caption-bold.html
      - text: |
          <meta name="citation_book_title" content="Conociendo el riesgo por aguas de escorrentía">
          <meta name="citation_publisher" content="Unidad Nacional para la Gestión del Riesgo de Desastres - UNGRD">
          <meta name="citation_publication_date" content="2026/02/03">
          <meta name="citation_online_date" content="2026/02/03">
          <meta name="citation_language" content="es">
          <meta name="citation_pdf_url" content="https://scr-ungrd.github.io/conociendo-el-riesgo-aguas-escorrentia/Conociendo_el_riesgo_por_aguas_de_escorrentia.pdf">
          <meta name="robots" content="index, follow">
    html-math-method: katex
